spring.config.import =file:./.env[.properties],optional:file:./.local.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/db?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto = create

spring.sql.init.platform = init
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode = always

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
